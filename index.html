<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Nomenclatura</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React y ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Excel y JSZip -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8f9fa;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const Plus = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
    const Check = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>;
    const ImageIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>;
    const AlertCircle = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;

    function App() {
      const [baseNames, setBaseNames] = useState([]);
      const [generatedRows, setGeneratedRows] = useState([]);
      const [sequence, setSequence] = useState('1, 2, 3, 4');
      const [orderMode, setOrderMode] = useState('agrupado');
      const [fileName, setFileName] = useState('');
      const [uploadedImages, setUploadedImages] = useState([]);
      const [errorMsg, setErrorMsg] = useState('');

      const handleFileUpload = (e) => {
        setErrorMsg('');
        const file = e.target.files[0];
        if (!file) return;
        setFileName(file.name);
        
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const data = new Uint8Array(evt.target.result);
            const workbook = window.XLSX.read(data, { type: 'array' });
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = window.XLSX.utils.sheet_to_json(worksheet, { header: 1 });
            
            const names = json
              .filter(row => Array.isArray(row) && row.length > 0)
              .map(row => {
                const templateCell = row.find(col => {
                  const str = String(col || '');
                  return str.includes('-01-') && (str.toLowerCase().includes('.jpg') || str.toLowerCase().includes('.jpeg'));
                });
                if (!templateCell) return null;
                return { original: String(row[0] || '').trim(), template: String(templateCell).trim() };
              })
              .filter(item => item !== null);
              
            if (names.length === 0) setErrorMsg("No encontré filas con el formato de imagen (-01- y .jpg/.jpeg)");
            setBaseNames(names);
          } catch (err) { 
            setErrorMsg("Hubo un error al leer el archivo Excel/CSV.");
          }
        };
        reader.readAsArrayBuffer(file);
      };

      const handleImagesUpload = (e) => {
        const files = Array.from(e.target.files);
        files.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
        setUploadedImages(files);
      };

      const generateData = () => {
        if (baseNames.length === 0) {
          setGeneratedRows([]);
          return;
        }
        let result = [];
        const seqArray = sequence.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
        if (seqArray.length === 0) return;

        const getNewName = (name, num) => {
          const numStr = num.toString().padStart(2, '0');
          return name.replace('-01-', `-${numStr}-`); 
        };

        if (orderMode === 'agrupado') {
          baseNames.forEach(item => {
            seqArray.forEach(num => result.push({ original: item.original, nuevo: getNewName(item.template, num) }));
          });
        } else {
          seqArray.forEach(num => {
            baseNames.forEach(item => result.push({ original: item.original, nuevo: getNewName(item.template, num) }));
          });
        }
        setGeneratedRows(result);
      };

      useEffect(() => { generateData(); }, [baseNames, sequence, orderMode]);

      const downloadExcel = () => {
        if (generatedRows.length === 0) return;
        const data = [['SKU Original', 'Nuevo Nombre Archivo', 'Comando MV'], ...generatedRows.map((row, i) => [
          row.original, row.nuevo, `="mv """&A${i+2}&""" """&B${i+2}&""""`
        ])];
        const ws = window.XLSX.utils.aoa_to_sheet(data);
        const wb = window.XLSX.utils.book_new();
        window.XLSX.utils.book_append_sheet(wb, ws, "Nomenclaturas");
        window.XLSX.writeFile(wb, 'Planilla_Nomenclatura.xlsx');
      };

      const downloadZip = async () => {
        if (uploadedImages.length === 0 || generatedRows.length === 0) return;
        const zip = new window.JSZip();
        
        uploadedImages.forEach((file, i) => {
          if (generatedRows[i]) {
            const ext = file.name.split('.').pop();
            let newName = generatedRows[i].nuevo;
            if (!newName.toLowerCase().endsWith(`.${ext.toLowerCase()}`)) {
               newName = newName.replace(/\.[^/.]+$/, "") + `.${ext}`;
            }
            zip.file(newName, file);
          }
        });

        const content = await zip.generateAsync({ type: "blob" });
        const url = URL.createObjectURL(content);
        const a = document.createElement("a");
        a.href = url;
        a.download = "imagenes_renombradas.zip";
        a.click();
        URL.revokeObjectURL(url);
      };

      return (
        <div className="min-h-screen p-4 md:p-8 text-zinc-900 flex flex-col items-center">
          <div className="w-full max-w-6xl">
            
            {/* Header */}
            <div className="mb-8 flex items-center gap-3">
              <h1 className="text-3xl font-extrabold tracking-tight">Generador de Nomenclatura</h1>
              <div className="bg-[#d4ff00] rounded-full p-1.5 flex items-center justify-center">
                <Check className="w-5 h-5 text-black" />
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
              
              {/* Columna Izquierda: Controles (Estructura Original) */}
              <div className="lg:col-span-4 space-y-5">
                
                {errorMsg && (
                  <div className="p-4 bg-red-50 text-red-600 rounded-2xl text-sm font-bold flex gap-3 items-center border border-red-100">
                    <AlertCircle className="w-5 h-5 shrink-0" />
                    <span>{errorMsg}</span>
                  </div>
                )}

                {/* Paso 1: Excel */}
                <div className="bg-white rounded-3xl p-5 shadow-[0_2px_15px_-3px_rgba(0,0,0,0.03)] border border-gray-100">
                  <div className="flex justify-between items-center mb-4">
                    <div className="flex items-center gap-2.5">
                      <div className="w-3 h-3 bg-[#d4ff00] rounded-sm"></div>
                      <span className="font-bold text-gray-800 text-sm">1. Documento Base</span>
                    </div>
                    <label className="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center cursor-pointer hover:bg-gray-100 transition-colors border border-gray-100">
                      <Plus className="w-4 h-4 text-gray-600" />
                      <input type="file" className="hidden" accept=".csv, .xlsx" onChange={handleFileUpload} />
                    </label>
                  </div>
                  <div className="bg-gray-50 rounded-xl p-3 text-center border border-dashed border-gray-200">
                    <p className="text-xs font-bold text-gray-500 truncate">{fileName || "Ningún Excel / CSV"}</p>
                  </div>
                </div>

                {/* Pasos 2 y 3: Secuencia y Orden */}
                <div className="bg-white rounded-3xl p-5 shadow-[0_2px_15px_-3px_rgba(0,0,0,0.03)] border border-gray-100 space-y-5">
                  <div className="space-y-2">
                    <label className="text-[11px] font-bold text-gray-400 uppercase tracking-wider block">2. Secuencia</label>
                    <input 
                      type="text" 
                      value={sequence} 
                      onChange={(e) => setSequence(e.target.value)} 
                      placeholder="Ej: 1, 2, 3, 4" 
                      className="w-full bg-gray-50 p-3 rounded-xl font-bold text-sm outline-none focus:ring-2 focus:ring-[#d4ff00] transition-all" 
                    />
                  </div>
                  <div className="space-y-2">
                    <label className="text-[11px] font-bold text-gray-400 uppercase tracking-wider block">3. Orden Lógico</label>
                    <div className="flex bg-gray-50 rounded-xl p-1 relative border border-gray-100">
                      <button onClick={() => setOrderMode('agrupado')} className={`flex-1 py-2 rounded-lg text-xs font-bold transition-all ${orderMode === 'agrupado' ? 'bg-white shadow-sm text-black border border-gray-100' : 'text-gray-400 hover:text-gray-600'}`}>Agrupado</button>
                      <button onClick={() => setOrderMode('intercalado')} className={`flex-1 py-2 rounded-lg text-xs font-bold transition-all ${orderMode === 'intercalado' ? 'bg-white shadow-sm text-black border border-gray-100' : 'text-gray-400 hover:text-gray-600'}`}>Intercalado</button>
                    </div>
                  </div>
                </div>

                {/* Paso 4: Imágenes */}
                <div className="bg-white rounded-3xl p-5 shadow-[0_2px_15px_-3px_rgba(0,0,0,0.03)] border border-gray-100">
                  <div className="flex justify-between items-center mb-4">
                    <div className="flex items-center gap-2.5">
                      <div className="w-3 h-3 bg-black rounded-sm"></div>
                      <span className="font-bold text-gray-800 text-sm">4. Imágenes (Opcional)</span>
                    </div>
                    <label className="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center cursor-pointer hover:bg-gray-100 transition-colors border border-gray-100">
                      <Plus className="w-4 h-4 text-gray-600" />
                      <input type="file" multiple accept="image/*" className="hidden" onChange={handleImagesUpload} />
                    </label>
                  </div>
                  <div className="bg-gray-50 rounded-xl p-3 flex justify-between items-center border border-dashed border-gray-200">
                    <span className="text-xs font-bold text-gray-500">{uploadedImages.length} fotos cargadas</span>
                    {uploadedImages.length > 0 && uploadedImages.length !== generatedRows.length && (
                      <span className="text-[10px] bg-red-100 text-red-600 px-2 py-0.5 rounded font-bold">⚠️ Diferencia</span>
                    )}
                  </div>
                </div>

                {/* Botones de Acción */}
                <div className="flex flex-col sm:flex-row lg:flex-col gap-3 pt-2">
                  <button onClick={downloadExcel} disabled={!generatedRows.length} className="w-full bg-black text-white p-3.5 rounded-full font-bold hover:bg-gray-800 disabled:opacity-50 disabled:cursor-not-allowed transition-all text-sm">
                    Descargar Excel
                  </button>
                  <button onClick={downloadZip} disabled={!uploadedImages.length || !generatedRows.length} className="w-full bg-[#d4ff00] text-black p-3.5 rounded-full font-bold hover:bg-[#c4ec00] disabled:opacity-50 disabled:cursor-not-allowed transition-all text-sm">
                    Descargar ZIP
                  </button>
                </div>

              </div>

              {/* Columna Derecha: Tabla de Vista Previa (Estructura Original) */}
              <div className="lg:col-span-8 bg-white rounded-[2rem] shadow-[0_2px_15px_-3px_rgba(0,0,0,0.03)] border border-gray-100 flex flex-col h-[650px] overflow-hidden">
                <div className="p-5 border-b border-gray-100 flex justify-between items-center bg-white z-10">
                  <span className="text-xs font-bold text-gray-400 uppercase tracking-wider">Vista Previa de Nomenclatura</span>
                  <span className="bg-gray-50 text-black text-xs font-bold px-3 py-1 rounded-full border border-gray-100">{generatedRows.length} resultados</span>
                </div>
                
                <div className="flex-1 overflow-auto bg-white">
                  <table className="w-full text-sm text-left border-collapse">
                    <thead className="text-[10px] text-gray-400 uppercase tracking-wider sticky top-0 bg-white/90 backdrop-blur-sm border-b border-gray-100">
                      <tr>
                        <th className="py-3 px-5 font-bold w-16">#</th>
                        <th className="py-3 px-5 font-bold">Imagen Asignada</th>
                        <th className="py-3 px-5 font-bold">Nuevo Nombre</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-50">
                      {generatedRows.length > 0 ? (
                        generatedRows.map((r, i) => {
                          const fileObj = uploadedImages[i];
                          return (
                            <tr key={i} className="hover:bg-gray-50/50 transition-colors">
                              <td className="py-4 px-5 text-gray-400 font-medium">{i + 1}</td>
                              <td className="py-4 px-5 max-w-[150px] truncate">
                                {fileObj ? (
                                  <span className="inline-flex items-center gap-1.5 font-medium text-gray-900 bg-gray-100 px-2.5 py-1 rounded-md text-xs truncate max-w-full">
                                    <ImageIcon className="w-3 h-3 text-gray-500 shrink-0" />
                                    <span className="truncate">{fileObj.name}</span>
                                  </span>
                                ) : (
                                  <span className="text-gray-300 italic text-xs">Sin archivo...</span>
                                )}
                              </td>
                              <td className="py-4 px-5 font-mono text-xs font-semibold text-black max-w-[200px] truncate" title={r.nuevo}>{r.nuevo}</td>
                            </tr>
                          )
                        })
                      ) : (
                        <tr>
                          <td colSpan="3" className="py-20 text-center text-gray-400 text-sm">
                            Sube un documento base para comenzar la previsualización.
                          </td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
